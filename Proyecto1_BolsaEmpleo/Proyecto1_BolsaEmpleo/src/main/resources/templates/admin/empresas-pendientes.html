<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empresas pendientes</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>

<body>

<header class="encabezado-sitio">
    <div class="contenedor">
        <div class="marca">
            <img th:src="@{/img/empleo.jpg}" alt="Logo" class="marca-logo">
            <span>Empresas pendientes</span>
        </div>

        <nav class="navegacion-sitio">
            <a th:href="@{/admin/dashboard}">Dashboard</a>
            <a th:href="@{/logout}">Cerrar sesión</a>
        </nav>
    </div>
</header>

<main class="pagina">
    <div class="contenedor">

        <section class="panel">
            <h1 class="titulo-pagina">Empresas pendientes</h1>

            <div th:if="${#lists.isEmpty(usuarios)}" class="vacio">
                No hay empresas pendientes.
            </div>

            <div th:if="${not #lists.isEmpty(usuarios)}" class="contenedor-tabla">
                <table>
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Correo</th>
                        <th>Acción</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="u : ${usuarios}">
                        <td th:text="${u.id}"></td>
                        <td th:text="${u.correoElectronico}"></td>
                        <td>
                            <a class="boton" th:href="@{'/admin/aprobar/' + ${u.id}}">
                                Aprobar
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

        </section>

    </div>
</main>

</body>
</html>
