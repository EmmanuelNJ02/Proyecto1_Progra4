<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard oferente</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>

<header class="encabezado-sitio">
    <div class="contenedor">
        <div class="marca">
            <img th:src="@{/img/empleo.jpg}" alt="Logo" class="marca-logo">
            <span>Panel de oferente</span>
        </div>

        <nav class="navegacion-sitio">
            <a th:href="@{/oferente/dashboard}">Dashboard</a>
            <a th:href="@{/oferente/habilidades}">Mis habilidades y CV</a>
            <a th:href="@{/logout}">Cerrar sesión</a>
        </nav>
    </div>
</header>

<main class="pagina">
    <div class="contenedor">
        <section class="panel">

            <h1 class="titulo-pagina">Oferente - Dashboard</h1>
            <p class="subtitulo-pagina" th:if="${oferente != null}">
                Bienvenido, <strong th:text="${oferente.nombreOferente + ' ' + oferente.primerApellido}"></strong>.
            </p>

            <div class="acciones">
                <a class="boton" th:href="@{/oferente/habilidades}">Mis habilidades</a>

                <a th:if="${oferente.rutaCurriculum != null and oferente.rutaCurriculum != ''}"
                   class="boton boton-secundario"
                   th:href="@{/oferente/cv}"
                   target="_blank">
                    Ver mi CV
                </a>
            </div>

        </section>
    </div>
</main>

</body>
</html>
