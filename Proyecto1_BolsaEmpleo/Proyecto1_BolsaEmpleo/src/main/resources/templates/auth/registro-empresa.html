<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de empresa</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>

<body>

<header class="encabezado-sitio">
    <div class="contenedor">
        <div class="marca">
            <img th:src="@{/img/empleo.jpg}" alt="Logo" class="marca-logo">
            <span>Bolsa de Empleo</span>
        </div>

        <nav class="navegacion-sitio">
            <a th:href="@{/}">Inicio</a>
            <a th:href="@{/login}">Login</a>
        </nav>
    </div>
</header>

<main class="pagina">
    <div class="contenedor">

        <section class="panel">
            <h1 class="titulo-pagina">Registro de empresa</h1>

            <p class="subtitulo-pagina">
                Complete los datos de la empresa. El registro quedará pendiente de aprobación por parte del administrador.
            </p>

            <div th:if="${error}" class="alerta alerta-error" th:text="${error}"></div>

            <form th:action="@{/registro/empresa}" method="post" th:object="${registroEmpresaForm}">

                <div class="rejilla-formulario rejilla-formulario-2">

                    <div>
                        <label>Nombre de la empresa</label>
                        <input type="text" th:field="*{nombreEmpresa}" placeholder="Nombre comercial">
                    </div>

                    <div>
                        <label>Localización</label>
                        <input type="text" th:field="*{localizacion}" placeholder="Provincia / Cantón">
                    </div>

                    <div>
                        <label>Correo electrónico</label>
                        <input type="email" th:field="*{correoElectronico}" placeholder="empresa@correo.com">
                    </div>

                    <div>
                        <label>Teléfono</label>
                        <input type="text" th:field="*{telefono}" placeholder="8888-8888">
                    </div>

                    <div style="grid-column:1/-1;">
                        <label>Descripción</label>
                        <textarea th:field="*{descripcion}" placeholder="Describe la empresa y el tipo de puestos que publica"></textarea>
                    </div>

                    <div>
                        <label>Clave</label>
                        <input type="password" th:field="*{clave}" placeholder="Clave de acceso">
                    </div>

                </div>

                <div class="acciones" style="margin-top:18px;">
                    <button type="submit">Registrar empresa</button>
                    <a class="boton boton-secundario" th:href="@{/login}">Volver</a>
                </div>

            </form>
        </section>

    </div>
</main>

<footer class="footer">
    <div class="contenedor">
        <span>Registro de empresas</span>
        <span>Universidad Nacional</span>
    </div>
</footer>

</body>
</html>
